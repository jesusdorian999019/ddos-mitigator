<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDoS Mitigator - Panel de Control</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="container">
        <h1>DDoS Mitigator</h1>
        <div class="dashboard">
            <div class="metricas">
                <div class="metrica">
                    <h3>Alertas Activas</h3>
                    <span id="alertas-count">0</span>
                </div>
                <div class="metrica">
                    <h3>IPs Bloqueadas</h3>
                    <span id="bloqueadas-count">0</span>
                </div>
            </div>
            <canvas id="ppsChart" width="400" height="200"></canvas>
            <div id="top-ips"></div>
            <div id="alertas-detalle"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
